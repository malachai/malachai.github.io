<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yarn Pillow — WebGPU doodle</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0e0e12;
    color: #e9e9ee;
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  header { padding: 16px 20px 8px; }
  header a.back { color: #9aa0ff; text-decoration: none; font-size: 13px; }
  header a.back:hover { text-decoration: underline; }
  h1 { margin: 6px 0 2px; font-size: 18px; font-weight: 600; }
  p.desc { margin: 0; color: #a7a7b3; font-size: 13px; max-width: 60ch; }
  #stage {
    flex: 1;
    min-height: 0;
    margin: 12px 20px 20px;
    border-radius: 10px;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% 40%, #17171d 0%, #0a0a0e 100%);
    position: relative;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .controls {
    position: absolute; left: 12px; bottom: 12px;
    display: flex; gap: 8px;
  }
  .controls button {
    background: rgba(255,255,255,0.08);
    color: #e9e9ee;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 6px;
    padding: 5px 12px;
    font: inherit; font-size: 13px;
    cursor: pointer;
  }
  .controls button:hover { background: rgba(255,255,255,0.14); }

  /* Shape control panel */
  .shape-panel {
    position: absolute; top: 12px; right: 12px;
    width: 220px;
    background: rgba(16,16,22,0.72);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 14px 14px;
    display: flex; flex-direction: column; gap: 10px;
    font-size: 12px;
  }
  .shape-panel h2 {
    margin: 0 0 2px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; color: #c7c7d1;
  }
  .shape-panel .row { display: flex; flex-direction: column; gap: 3px; }
  .shape-panel .row .lbl {
    display: flex; justify-content: space-between;
    color: #b8b8c4;
  }
  .shape-panel .row .lbl .val { color: #9aa0ff; font-variant-numeric: tabular-nums; }
  .shape-panel input[type="range"] {
    width: 100%; margin: 0; accent-color: #9aa0ff; cursor: pointer;
  }
  .shape-panel .hint { color: #71717f; font-size: 11px; }
  .shape-panel button.reset {
    margin-top: 2px;
    background: rgba(255,255,255,0.06);
    color: #e9e9ee;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 6px;
    padding: 5px 10px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .shape-panel button.reset:hover { background: rgba(255,255,255,0.12); }
  @media (max-width: 560px) {
    .shape-panel { width: 170px; }
  }

  .doodle-fallback {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; height: 100%;
    padding: 24px; text-align: center; color: #c7c7d1;
  }
  .doodle-fallback img { max-width: 480px; width: 100%; border-radius: 8px; }
</style>
<script type="importmap">
{
  "imports": {
    "doodle-lib/": "../../lib/"
  }
}
</script>
</head>
<body>
  <header>
    <a class="back" href="../../index.html">← gallery</a>
    <h1>Yarn Pillow</h1>
    <p class="desc">
      A single fluffy woolen yarn winds along a Hilbert curve around an
      invisible rounded pillow, its twist and rainbow flowing forward forever.
      Use the panel to reshape the pillow.
    </p>
  </header>

  <div id="stage">
    <canvas id="c" aria-label="A single strand of woolen yarn wound in a space-filling path around a puffy pillow shape, with rainbow colours flowing along its length."></canvas>

    <div class="shape-panel" id="shape-panel" hidden>
      <h2>Pillow shape</h2>
      <div class="row">
        <span class="lbl"><label for="round">Roundness</label><span class="val" id="round-val"></span></span>
        <input type="range" id="round" min="0" max="1" step="0.01" />
      </div>
      <div class="row">
        <span class="lbl"><label for="thickness">Puffiness</label><span class="val" id="thickness-val"></span></span>
        <input type="range" id="thickness" min="0.02" max="1" step="0.01" />
      </div>
      <div class="row">
        <span class="lbl"><label for="aspect">Aspect</label><span class="val" id="aspect-val"></span></span>
        <input type="range" id="aspect" min="0.5" max="2" step="0.01" />
      </div>
      <div class="row">
        <span class="lbl"><label for="dome">Doming</label><span class="val" id="dome-val"></span></span>
        <input type="range" id="dome" min="0.1" max="2.5" step="0.01" />
      </div>
      <button class="reset" id="reset" type="button">Reset shape</button>

      <h2 style="margin-top:6px">Strands</h2>
      <div class="row">
        <span class="lbl"><label for="strands">Count</label><span class="val" id="strands-val"></span></span>
        <input type="range" id="strands" min="1" max="1000" step="1" />
      </div>
      <div class="row">
        <span class="lbl"><label for="coverage">Coverage</label><span class="val" id="coverage-val"></span></span>
        <input type="range" id="coverage" min="0.05" max="1" step="0.01" />
      </div>
      <button class="reset" id="shuffle" type="button">New colours</button>
    </div>

    <div class="controls"><button id="toggle" type="button">Pause</button></div>
  </div>

  <script type="module">
    import { isWebGPUAvailable, renderFallback } from "doodle-lib/support.js";
    import { initGPU } from "doodle-lib/gpu.js";
    import { runLoop } from "doodle-lib/loop.js";

    // Cache-bust the frequently-edited doodle files so a refresh never mixes a
    // new index.html with a stale cached doodle.js / shader.wgsl during iteration.
    const BUST = "?ts=" + Date.now();

    const canvas = document.getElementById("c");
    const stage = document.getElementById("stage");
    const toggle = document.getElementById("toggle");
    const panel = document.getElementById("shape-panel");

    // Fetch WGSL relative to this page (the doodle folder).
    const loadWGSL = (url) =>
      fetch(new URL(url + BUST, import.meta.url)).then((r) => {
        if (!r.ok) throw new Error(`Failed to load ${url}: HTTP ${r.status}`);
        return r.text();
      });

    // Slider config: id → { format }.
    const SLIDERS = {
      round:     (v) => v.toFixed(2),
      thickness: (v) => v.toFixed(2),
      aspect:    (v) => v.toFixed(2) + ":1",
      dome:      (v) => v.toFixed(2),
    };

    function wireControls(instance) {
      const shape = instance.getShape();
      panel.hidden = false;

      const sync = (id, value) => {
        const input = document.getElementById(id);
        const out = document.getElementById(id + "-val");
        input.value = String(value);
        out.textContent = SLIDERS[id](value);
      };

      for (const id of Object.keys(SLIDERS)) {
        sync(id, shape[id]);
        const input = document.getElementById(id);
        input.addEventListener("input", () => {
          const v = parseFloat(input.value);
          document.getElementById(id + "-val").textContent = SLIDERS[id](v);
          instance.setShape({ [id]: v });
        });
      }

      document.getElementById("reset").addEventListener("click", () => {
        const defaults = { round: 0.0, thickness: 0.8, aspect: 1.0, dome: 0.2 };
        instance.setShape(defaults);
        for (const id of Object.keys(SLIDERS)) sync(id, defaults[id]);
      });

      // Strand count.
      const strands = document.getElementById("strands");
      const strandsVal = document.getElementById("strands-val");
      strands.max = String(instance.maxStrands);
      const nStart = instance.getStrandCount();
      strands.value = String(nStart);
      strandsVal.textContent = String(nStart);
      strands.addEventListener("input", () => {
        const n = parseInt(strands.value, 10);
        strandsVal.textContent = String(n);
        instance.setStrandCount(n);
      });

      // Coverage (dash length vs gap).
      const coverage = document.getElementById("coverage");
      const coverageVal = document.getElementById("coverage-val");
      const cStart = instance.getCoverage();
      coverage.value = String(cStart);
      coverageVal.textContent = Math.round(cStart * 100) + "%";
      coverage.addEventListener("input", () => {
        const d = parseFloat(coverage.value);
        coverageVal.textContent = Math.round(d * 100) + "%";
        instance.setCoverage(d);
      });

      document.getElementById("shuffle").addEventListener("click", () => {
        instance.shuffleColors();
      });
    }

    (async () => {
      const doodle = (await import("./doodle.js" + BUST)).default;

      if (!isWebGPUAvailable()) {
        toggle.remove();
        renderFallback(stage, { reason: "no-webgpu", thumbnail: doodle.meta.thumbnail });
        return;
      }
      try {
        const { adapter, device, context, format } = await initGPU(canvas);
        const instance = await doodle.init({
          device, adapter, context, canvas, format, loadWGSL,
          mode: "standalone", quality: 1,
        });
        const handle = runLoop(instance, { canvas, context, device });

        wireControls(instance);

        let playing = true;
        toggle.addEventListener("click", () => {
          playing = !playing;
          if (playing) handle.resume();
          else handle.pause();
          toggle.textContent = playing ? "Pause" : "Play";
        });
      } catch (err) {
        console.error(err);
        toggle.remove();
        renderFallback(stage, {
          reason: String((err && err.message) || err),
          thumbnail: doodle.meta.thumbnail,
        });
      }
    })();
  </script>
</body>
</html>
