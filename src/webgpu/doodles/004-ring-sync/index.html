<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ring Sync — WebGPU doodle</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0e0e12;
    color: #e9e9ee;
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  header { padding: 16px 20px 8px; }
  header a.back { color: #9aa0ff; text-decoration: none; font-size: 13px; }
  header a.back:hover { text-decoration: underline; }
  h1 { margin: 6px 0 2px; font-size: 18px; font-weight: 600; }
  p.desc { margin: 0; color: #a7a7b3; font-size: 13px; max-width: 60ch; }
  #stage {
    flex: 1;
    min-height: 0;
    margin: 12px 20px 20px;
    border-radius: 10px;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% 40%, #17171d 0%, #0a0a0e 100%);
    position: relative;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .controls {
    position: absolute; left: 12px; bottom: 12px;
    display: flex; gap: 8px;
  }
  .controls button {
    background: rgba(255,255,255,0.08);
    color: #e9e9ee;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 6px;
    padding: 5px 12px;
    font: inherit; font-size: 13px;
    cursor: pointer;
  }
  .controls button:hover { background: rgba(255,255,255,0.14); }

  /* Tunable panel, top-right of the stage. */
  .panel {
    position: absolute; top: 12px; right: 12px;
    width: 226px;
    background: rgba(14,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 12px 12px 10px;
    display: flex; flex-direction: column; gap: 9px;
    font-size: 12px; color: #cdd0da;
  }
  .panel .row { display: flex; flex-direction: column; gap: 3px; }
  .panel .row .lbl { display: flex; justify-content: space-between; }
  .panel .row .lbl b { font-weight: 600; color: #e9e9ee; }
  .panel input[type="range"] { width: 100%; accent-color: #0058ab; }
  /* Dual-thumb range: two overlaid range inputs (transparent tracks, only the
     thumbs are interactive) over a shared track with a highlighted sub-range. */
  .panel .dual { position: relative; height: 22px; }
  .panel .dual .track {
    position: absolute; left: 0; right: 0; top: 9px; height: 4px;
    border-radius: 2px; background: rgba(255,255,255,0.14);
  }
  .panel .dual .fill {
    position: absolute; top: 9px; height: 4px; border-radius: 2px; background: #0058ab;
  }
  .panel .dual input[type="range"] {
    position: absolute; left: 0; top: 0; width: 100%; height: 22px; margin: 0;
    -webkit-appearance: none; appearance: none; background: transparent; pointer-events: none;
  }
  .panel .dual input[type="range"]::-webkit-slider-runnable-track { background: transparent; border: none; }
  .panel .dual input[type="range"]::-moz-range-track { background: transparent; border: none; }
  .panel .dual input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; pointer-events: auto; cursor: pointer;
    width: 14px; height: 14px; margin-top: 4px; border-radius: 50%;
    background: #e9e9ee; border: 2px solid #0058ab;
  }
  .panel .dual input[type="range"]::-moz-range-thumb {
    pointer-events: auto; cursor: pointer;
    width: 14px; height: 14px; border-radius: 50%;
    background: #e9e9ee; border: 2px solid #0058ab;
  }
  .panel .inline { flex-direction: row; align-items: center; justify-content: space-between; gap: 8px; }
  .panel input[type="color"] {
    width: 34px; height: 22px; padding: 0; border: none; background: none; cursor: pointer;
  }
  .panel .btnrow { display: flex; gap: 8px; margin-top: 2px; }
  .panel .btnrow button {
    flex: 1;
    background: rgba(86,182,194,0.16);
    color: #d7f2f5;
    border: 1px solid rgba(86,182,194,0.35);
    border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .panel .btnrow button:hover { background: rgba(86,182,194,0.26); }
  .panel .chk { display: flex; align-items: center; gap: 7px; }
  .panel summary { cursor: pointer; color: #9aa0ff; list-style: none; font-size: 12px; }
  .panel summary::-webkit-details-marker { display: none; }

  /* Pressure table, top-left of the stage. */
  .ptable {
    position: absolute; top: 12px; left: 12px;
    width: 258px;
    background: rgba(14,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 10px 12px 11px;
    font-size: 12px; color: #cdd0da;
  }
  .ptable h2 {
    margin: 0 0 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: #9aa0ff;
  }
  .ptable .prow { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
  .ptable .plabel { width: 28px; color: #a7a7b3; font-variant-numeric: tabular-nums; }
  .ptable .ptrack {
    flex: 1; height: 8px; border-radius: 4px; overflow: hidden;
    background: rgba(255,255,255,0.08);
  }
  .ptable .pfill { height: 100%; width: 0%; background: #0058ab; transition: width 0.08s linear; }
  .ptable .pval { width: 30px; text-align: right; color: #e9e9ee; font-variant-numeric: tabular-nums; }
  .ptable .pkpa { width: 52px; text-align: right; color: #8fb4dd; font-variant-numeric: tabular-nums; }
  .ptable .pspd { width: 44px; text-align: right; color: #cfc08f; font-variant-numeric: tabular-nums; }
  .ptable .phead { color: #6f7180; font-size: 10px; letter-spacing: 0.02em; margin-bottom: 2px; }
  .ptable .phead .pval, .ptable .phead .pkpa, .ptable .phead .pspd { color: #6f7180; }

  .doodle-fallback {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; height: 100%;
    padding: 24px; text-align: center; color: #c7c7d1;
  }
  .doodle-fallback img { max-width: 480px; width: 100%; border-radius: 8px; }
</style>
<script type="importmap">
{
  "imports": {
    "doodle-lib/": "../../lib/"
  }
}
</script>
</head>
<body>
  <header>
    <a class="back" href="../../index.html">← gallery</a>
    <h1>Ring Sync</h1>
    <p class="desc">
      Concentric gated rings trade liquid through lined-up gates and slowly
      settle into sync.
    </p>
  </header>

  <div id="stage">
    <canvas id="c" aria-label="A top-down machine of concentric rings exchanging liquid through gates and settling into a common rotation."></canvas>

    <div class="controls"><button id="toggle" type="button">Pause</button></div>

    <div class="ptable" id="ptable">
      <h2>ring pressure</h2>
      <div id="prows"></div>
    </div>

    <details class="panel" id="panel" open>
      <summary>controls</summary>

      <div class="row">
        <span class="lbl">rings <b id="v-rings">8</b></span>
        <input type="range" id="r-rings" min="3" max="24" step="1" value="8" />
      </div>
      <div class="row">
        <span class="lbl">flow <b id="v-flow">0.40</b></span>
        <input type="range" id="r-flow" min="-2" max="6" step="0.05" value="-0.4" />
      </div>
      <div class="row">
        <span class="lbl">viscosity <b id="v-visc">1.0</b></span>
        <input type="range" id="r-visc" min="0.3" max="4" step="0.1" value="1" />
      </div>
      <div class="row">
        <span class="lbl">border <b id="v-border">0.30</b></span>
        <input type="range" id="r-border" min="0.15" max="0.5" step="0.01" value="0.3" />
      </div>
      <div class="row">
        <span class="lbl">shear lines <b id="v-lines">3</b></span>
        <input type="range" id="r-lines" min="1" max="8" step="1" value="3" />
      </div>
      <div class="row">
        <span class="lbl">gate width <b id="v-gate">2.0–5.0%</b></span>
        <div class="dual">
          <div class="track"></div><div class="fill" id="f-gate"></div>
          <input type="range" id="r-gmin" min="0.005" max="0.3" step="0.005" value="0.02" />
          <input type="range" id="r-gmax" min="0.005" max="0.3" step="0.005" value="0.05" />
        </div>
      </div>
      <div class="row">
        <span class="lbl">orientation <b id="v-orient">100–150°</b></span>
        <div class="dual">
          <div class="track"></div><div class="fill" id="f-orient"></div>
          <input type="range" id="r-omin" min="1" max="179" step="1" value="100" />
          <input type="range" id="r-omax" min="1" max="179" step="1" value="150" />
        </div>
      </div>
      <div class="row inline">
        <span>liquid colour</span>
        <input type="color" id="r-color" value="#0058ab" />
      </div>
      <label class="chk">
        <input type="checkbox" id="r-auto" checked /> auto-reset on sync
      </label>
      <div class="btnrow">
        <button id="r-reset" type="button">reset</button>
      </div>
    </details>
  </div>

  <script type="module">
    import { isWebGPUAvailable, renderFallback } from "doodle-lib/support.js";
    import { initGPU } from "doodle-lib/gpu.js";
    import { runLoop } from "doodle-lib/loop.js";

    // Cache-bust the frequently-edited doodle files (spec.md §6).
    const BUST = "?ts=" + Date.now();

    const canvas = document.getElementById("c");
    const stage = document.getElementById("stage");
    const panel = document.getElementById("panel");
    const ptable = document.getElementById("ptable");
    const toggle = document.getElementById("toggle");

    const loadWGSL = (url) =>
      fetch(new URL(url + BUST, import.meta.url)).then((r) => {
        if (!r.ok) throw new Error(`Failed to load ${url}: HTTP ${r.status}`);
        return r.text();
      });

    (async () => {
      const doodle = (await import("./doodle.js" + BUST)).default;

      if (!isWebGPUAvailable()) {
        toggle.remove();
        panel.remove();
        ptable.remove();
        renderFallback(stage, { reason: "no-webgpu", thumbnail: doodle.meta.thumbnail });
        return;
      }
      try {
        const { adapter, device, context, format } = await initGPU(canvas);
        const instance = await doodle.init({
          device, adapter, context, canvas, format, loadWGSL,
          mode: "standalone", quality: 1,
        });
        const handle = runLoop(instance, { canvas, context, device });

        let playing = true;
        toggle.addEventListener("click", () => {
          playing = !playing;
          if (playing) handle.resume();
          else handle.pause();
          toggle.textContent = playing ? "Pause" : "Play";
        });

        // ---- wire the control panel ----
        const $ = (id) => document.getElementById(id);
        const bindSlider = (id, vid, fmt, set) => {
          const el = $(id), lab = $(vid);
          el.addEventListener("input", () => {
            const val = parseFloat(el.value);
            set(val);
            lab.textContent = fmt(val);
          });
        };
        bindSlider("r-rings", "v-rings", (v) => String(v | 0), (v) => instance.setRingCount(v));
        // Dual-thumb range: two overlaid range inputs whose thumbs can't cross
        // (min ≤ max, enforced live), a highlighted fill between them, and a
        // combined label. setLo/setHi push each end to the doodle.
        const bindDualRange = (loId, hiId, fillId, labId, fmt, setLo, setHi) => {
          const lo = $(loId), hi = $(hiId), fill = $(fillId), lab = $(labId);
          const a = parseFloat(lo.min), b = parseFloat(lo.max);
          const pct = (v) => ((v - a) / (b - a)) * 100;
          const refresh = () => {
            const vlo = parseFloat(lo.value), vhi = parseFloat(hi.value);
            fill.style.left = pct(vlo) + "%";
            fill.style.width = (pct(vhi) - pct(vlo)) + "%";
            lab.textContent = fmt(vlo, vhi);
          };
          lo.addEventListener("input", () => {
            let vlo = parseFloat(lo.value);
            if (vlo > parseFloat(hi.value)) { vlo = parseFloat(hi.value); lo.value = vlo; }
            setLo(vlo); refresh();
          });
          hi.addEventListener("input", () => {
            let vhi = parseFloat(hi.value);
            if (vhi < parseFloat(lo.value)) { vhi = parseFloat(lo.value); hi.value = vhi; }
            setHi(vhi); refresh();
          });
          refresh();
        };
        // Flow is a log-scale slider (0.01 … 1,000,000): the slider carries
        // log10(flow); map back to the actual rate.
        {
          const el = $("r-flow"), lab = $("v-flow");
          const fmt = (f) => (f >= 1000 ? f.toExponential(1) : (f >= 10 ? f.toFixed(0) : f.toFixed(2)));
          el.addEventListener("input", () => {
            const f = Math.pow(10, parseFloat(el.value));
            instance.setFlowRate(f);
            lab.textContent = fmt(f);
          });
        }
        bindSlider("r-visc", "v-visc", (v) => v.toFixed(1), (v) => instance.setViscosity(v));
        bindSlider("r-border", "v-border", (v) => v.toFixed(2), (v) => instance.setBorderWidth(v));
        bindSlider("r-lines", "v-lines", (v) => String(v | 0), (v) => instance.setShearLines(v));
        bindDualRange("r-gmin", "r-gmax", "f-gate", "v-gate",
          (a, b) => (a * 100).toFixed(1) + "–" + (b * 100).toFixed(1) + "%",
          (v) => instance.setGateMin(v), (v) => instance.setGateMax(v));
        bindDualRange("r-omin", "r-omax", "f-orient", "v-orient",
          (a, b) => (a | 0) + "–" + (b | 0) + "°",
          (v) => instance.setOrientMin(v), (v) => instance.setOrientMax(v));
        $("r-color").addEventListener("input", (e) => instance.setColor(e.target.value));
        $("r-auto").addEventListener("change", (e) => instance.setAutoReset(e.target.checked));
        $("r-reset").addEventListener("click", () => instance.reset());

        // ---- ring table (pressure + speed; rebuilds when ring count changes) --
        // Pressure is fill 0..1 shown as % and absolute kPa (0 at empty,
        // KPA_FULL at a full ring, uncapped). Speed is angular velocity (rad/s,
        // signed). Each bar is tinted the ring's palette colour (matches the
        // shader's ringColor).
        const KPA_FULL = 250;
        const prows = $("prows");
        let fills = [];   // { bar, val, kpa, spd } per ring

        // Match shader ringColor(k): cosine palette shifted by the chosen hue.
        const hexToRgb = (hex) => {
          let h = hex.replace("#", "");
          if (h.length === 3) h = h.split("").map((c) => c + c).join("");
          const n = parseInt(h, 16);
          return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
        };
        const hueOf = (c) => {
          const mx = Math.max(...c), mn = Math.min(...c), d = mx - mn;
          if (d < 1e-6) return 0;
          let hh;
          if (mx === c[0]) hh = ((c[1] - c[2]) / d) % 6;
          else if (mx === c[1]) hh = (c[2] - c[0]) / d + 2;
          else hh = (c[0] - c[1]) / d + 4;
          hh /= 6;
          return hh < 0 ? hh + 1 : hh;
        };
        const ringCss = (k, hue) => {
          const off = [0, 0.33, 0.67];
          const rgb = off.map((o) => 0.5 + 0.5 * Math.cos(2 * Math.PI * (0.13 * k + hue + o)));
          return "rgb(" + rgb.map((x) => Math.round(Math.max(0, Math.min(1, x)) * 255)).join(",") + ")";
        };

        function buildTable(n) {
          prows.innerHTML =
            `<div class="prow phead"><span class="plabel"></span>` +
            `<span class="ptrack" style="background:none"></span>` +
            `<span class="pval">%</span><span class="pkpa">kPa</span>` +
            `<span class="pspd">rad/s</span></div>`;
          fills = [];
          for (let i = 0; i < n; i++) {
            const row = document.createElement("div");
            row.className = "prow";
            const lbl = i === 0 ? "core" : "R" + i;
            row.innerHTML =
              `<span class="plabel">${lbl}</span>` +
              `<span class="ptrack"><span class="pfill"></span></span>` +
              `<span class="pval">0%</span>` +
              `<span class="pkpa">0</span>` +
              `<span class="pspd">0.00</span>`;
            prows.appendChild(row);
            fills.push({
              bar: row.querySelector(".pfill"),
              val: row.querySelector(".pval"),
              kpa: row.querySelector(".pkpa"),
              spd: row.querySelector(".pspd"),
            });
          }
        }
        buildTable(instance.getRingCount());

        const tick = () => {
          const p = instance.getPressures();
          const s = instance.getSpeeds();
          if (p.length !== fills.length) buildTable(p.length);
          const hue = hueOf(hexToRgb(instance.getColor()));
          for (let i = 0; i < p.length; i++) {
            const raw = Math.max(0, p[i]);            // uncapped (can exceed "full")
            fills[i].bar.style.width = Math.min(100, Math.round(raw * 100)) + "%";
            fills[i].bar.style.background = ringCss(i, hue);
            fills[i].val.textContent = Math.round(raw * 100) + "%";
            fills[i].kpa.textContent = Math.round(raw * KPA_FULL);
            fills[i].spd.textContent = (s[i] >= 0 ? "" : "-") + Math.abs(s[i]).toFixed(2);
          }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      } catch (err) {
        console.error(err);
        toggle.remove();
        panel.remove();
        ptable.remove();
        renderFallback(stage, {
          reason: String((err && err.message) || err),
          thumbnail: doodle.meta.thumbnail,
        });
      }
    })();
  </script>
</body>
</html>
