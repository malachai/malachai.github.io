<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rolling Decay — WebGPU doodle</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0e0e12;
    color: #e9e9ee;
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  header { padding: 16px 20px 8px; }
  header a.back { color: #9aa0ff; text-decoration: none; font-size: 13px; }
  header a.back:hover { text-decoration: underline; }
  h1 { margin: 6px 0 2px; font-size: 18px; font-weight: 600; }
  p.desc { margin: 0; color: #a7a7b3; font-size: 13px; max-width: 60ch; }
  #stage {
    flex: 1;
    min-height: 0;
    margin: 12px 20px 20px;
    border-radius: 10px;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% 40%, #17171d 0%, #0a0a0e 100%);
    position: relative;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .controls {
    position: absolute; left: 12px; bottom: 12px;
    display: flex; gap: 8px;
  }
  .controls button {
    background: rgba(255,255,255,0.08);
    color: #e9e9ee;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 6px;
    padding: 5px 12px;
    font: inherit; font-size: 13px;
    cursor: pointer;
  }
  .controls button:hover { background: rgba(255,255,255,0.14); }

  /* Tunable panel, top-right of the stage. */
  .panel {
    position: absolute; top: 12px; right: 12px;
    width: 222px;
    background: rgba(14,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 12px 12px 10px;
    display: flex; flex-direction: column; gap: 9px;
    font-size: 12px; color: #cdd0da;
  }
  .panel .row { display: flex; flex-direction: column; gap: 3px; }
  .panel .row .lbl { display: flex; justify-content: space-between; }
  .panel .row .lbl b { font-weight: 600; color: #e9e9ee; }
  .panel input[type="range"] { width: 100%; accent-color: #9aa0ff; }
  .panel select {
    width: 100%; background: rgba(255,255,255,0.06); color: #e9e9ee;
    border: 1px solid rgba(255,255,255,0.14); border-radius: 6px;
    padding: 4px 6px; font: inherit; font-size: 12px;
  }
  .panel .inline { flex-direction: row; align-items: center; justify-content: space-between; gap: 8px; }
  .panel .btnrow { display: flex; gap: 8px; margin-top: 2px; }
  .panel .btnrow button {
    flex: 1;
    background: rgba(154,160,255,0.16);
    color: #e2e4ff;
    border: 1px solid rgba(154,160,255,0.35);
    border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .panel .btnrow button:hover { background: rgba(154,160,255,0.26); }
  .panel summary { cursor: pointer; color: #9aa0ff; list-style: none; font-size: 12px; }
  .panel summary::-webkit-details-marker { display: none; }

  .doodle-fallback {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; height: 100%;
    padding: 24px; text-align: center; color: #c7c7d1;
  }
  .doodle-fallback img { max-width: 480px; width: 100%; border-radius: 8px; }
</style>
<script type="importmap">
{
  "imports": {
    "doodle-lib/": "../../lib/"
  }
}
</script>
</head>
<body>
  <header>
    <a class="back" href="../../index.html">← gallery</a>
    <h1>Rolling Decay</h1>
    <p class="desc">
      Shiny cubes tip square-by-square across a chessboard, sinking the floor
      behind them until every cube is stranded.
    </p>
  </header>

  <div id="stage">
    <canvas id="c" aria-label="Metal cubes rolling across a chessboard whose squares sink away behind them, seen from a slowly orbiting three-quarter view."></canvas>

    <div class="controls"><button id="toggle" type="button">Pause</button></div>

    <details class="panel" id="panel" open>
      <summary>controls</summary>

      <div class="row">
        <span class="lbl">grid X <b id="v-gx">12</b></span>
        <input type="range" id="r-gx" min="2" max="32" step="1" value="12" />
      </div>
      <div class="row">
        <span class="lbl">grid Y <b id="v-gy">12</b></span>
        <input type="range" id="r-gy" min="2" max="32" step="1" value="12" />
      </div>
      <div class="row">
        <span class="lbl">cubes <b id="v-cubes">6</b></span>
        <input type="range" id="r-cubes" min="1" max="64" step="1" value="6" />
      </div>
      <div class="row">
        <span class="lbl">speed <b id="v-speed">1.5</b>/s</span>
        <input type="range" id="r-speed" min="0.25" max="8" step="0.25" value="1.5" />
      </div>
      <div class="row">
        <span class="lbl">palette</span>
        <select id="r-pal"></select>
      </div>
      <div class="row">
        <span class="lbl">mosaic <b id="v-mosaic">0.00</b></span>
        <input type="range" id="r-mosaic" min="0" max="1" step="0.01" value="0" />
      </div>
      <div class="btnrow">
        <button id="r-rand" type="button">randomise</button>
        <button id="r-reset" type="button">reset</button>
      </div>
    </details>
  </div>

  <script type="module">
    import { isWebGPUAvailable, renderFallback } from "doodle-lib/support.js";
    import { initGPU } from "doodle-lib/gpu.js";
    import { runLoop } from "doodle-lib/loop.js";

    // Cache-bust the frequently-edited doodle files (spec.md §6).
    const BUST = "?ts=" + Date.now();

    const canvas = document.getElementById("c");
    const stage = document.getElementById("stage");
    const panel = document.getElementById("panel");
    const toggle = document.getElementById("toggle");

    const loadWGSL = (url) =>
      fetch(new URL(url + BUST, import.meta.url)).then((r) => {
        if (!r.ok) throw new Error(`Failed to load ${url}: HTTP ${r.status}`);
        return r.text();
      });

    (async () => {
      const doodle = (await import("./doodle.js" + BUST)).default;

      if (!isWebGPUAvailable()) {
        toggle.remove();
        panel.remove();
        renderFallback(stage, { reason: "no-webgpu", thumbnail: doodle.meta.thumbnail });
        return;
      }
      try {
        const { adapter, device, context, format } = await initGPU(canvas);
        const instance = await doodle.init({
          device, adapter, context, canvas, format, loadWGSL,
          mode: "standalone", quality: 1,
        });
        const handle = runLoop(instance, { canvas, context, device });

        let playing = true;
        toggle.addEventListener("click", () => {
          playing = !playing;
          if (playing) handle.resume();
          else handle.pause();
          toggle.textContent = playing ? "Pause" : "Play";
        });

        // ---- wire the control panel ----
        const $ = (id) => document.getElementById(id);
        const bindSlider = (id, vid, fmt, set) => {
          const el = $(id), lab = $(vid);
          el.addEventListener("input", () => {
            const val = parseFloat(el.value);
            set(val);
            if (lab) lab.textContent = fmt(val);
          });
        };
        bindSlider("r-gx", "v-gx", (v) => String(v | 0),
          (v) => instance.setGrid({ x: v, y: instance.getGrid().y }));
        bindSlider("r-gy", "v-gy", (v) => String(v | 0),
          (v) => instance.setGrid({ x: instance.getGrid().x, y: v }));
        bindSlider("r-cubes", "v-cubes", (v) => String(v | 0),
          (v) => instance.setCubeCount(v));
        bindSlider("r-speed", "v-speed", (v) => v.toFixed(2),
          (v) => instance.setSpeed(v));
        bindSlider("r-mosaic", "v-mosaic", (v) => v.toFixed(2),
          (v) => instance.setMosaic(v));

        // Palette dropdown, populated from the doodle's own list.
        const sel = $("r-pal");
        for (const name of instance.paletteNames) {
          const opt = document.createElement("option");
          opt.value = name; opt.textContent = name;
          sel.appendChild(opt);
        }
        sel.value = instance.getPalette();
        sel.addEventListener("change", () => instance.setPalette(sel.value));

        $("r-rand").addEventListener("click", () => {
          instance.randomPalette();
          sel.value = ""; // "Random" isn't a listed option; clear the selection
        });
        $("r-reset").addEventListener("click", () => instance.reset());
      } catch (err) {
        console.error(err);
        toggle.remove();
        panel.remove();
        renderFallback(stage, {
          reason: String((err && err.message) || err),
          thumbnail: doodle.meta.thumbnail,
        });
      }
    })();
  </script>
</body>
</html>
